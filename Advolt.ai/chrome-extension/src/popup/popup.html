<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advolt.ai</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Login View -->
    <div id="view-login" class="view hidden">
      <div class="logo">⚡ Advolt.ai</div>
      <p class="tagline">Save & analyze winning ads</p>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" id="login-btn">Log In</button>
        <p id="login-error" class="error hidden"></p>
      </form>
    </div>

    <!-- Main View -->
    <div id="view-main" class="view hidden">
      <div class="header">
        <span class="logo-sm">⚡ Advolt.ai</span>
        <button id="logout-btn" class="btn-ghost">Logout</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span id="ads-count">—</span>
          <label>Ads Saved</label>
        </div>
        <div class="stat">
          <span id="ai-credits">—</span>
          <label>AI Credits</label>
        </div>
        <div class="stat">
          <span id="plan-badge">—</span>
          <label>Plan</label>
        </div>
      </div>

      <div class="section-title">Recent Saves</div>
      <div id="recent-ads" class="ad-list">
        <p class="empty">No ads saved yet.</p>
      </div>

      <a href="https://YOUR_DASHBOARD_URL" target="_blank" class="btn-primary">
        Open Dashboard →
      </a>
    </div>

    <!-- Loading View -->
    <div id="view-loading" class="view">
      <div class="spinner"></div>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
