AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Advolt.ai — AI Ad Intelligence SaaS Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DYNAMODB_TABLE_ADS: !Ref AdsTable
        DYNAMODB_TABLE_AI: !Ref AiAnalysisTable
        DYNAMODB_TABLE_USERS: !Ref UsersTable
        DYNAMODB_TABLE_PROJECTS: !Ref ProjectsTable
        ADS_BUCKET: !Ref MediaBucket
        CLOUDFRONT_URL: !Sub "https://${MediaDistribution.DomainName}"
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_CLIENT_ID: !Ref UserPoolClient
        AI_QUEUE_URL: !Ref AiQueue
        STAGE: !Ref Stage
        EVENT_BUS_NAME: !Ref AdSavedEventBus
        AI_PROVIDER: groq
        GEMINI_API_KEY: !Ref GeminiApiKey
        GROQ_API_KEY: !Ref GroqApiKey
    Layers:
      - !Ref SharedLayer

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  OpenAIApiKey:
    Type: String
    NoEcho: true
  ClaudeApiKey:
    Type: String
    NoEcho: true
  RazorpayKey:
    Type: String
    NoEcho: true
  RazorpaySecret:
    Type: String
    NoEcho: true
  RazorpayWebhookSecret:
    Type: String
    NoEcho: true
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: "dummy_gemini_key"
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: "dummy_groq_key"
  PayUMerchantKey:
    Type: String
    NoEcho: true
    Default: "dummy_payu_key"
  PayUSalt:
    Type: String
    NoEcho: true
    Default: "dummy_payu_salt"

# ─────────────────────────────────────────────
# API GATEWAY
# ─────────────────────────────────────────────
Resources:

  AdvoltApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "advolt-api-${Stage}"
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
        AllowCredentials: false
      Auth:
        DefaultAuthorizer: LambdaAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          LambdaAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - Authorization
            AuthorizerResultTtlInSeconds: 0
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 20

# ─────────────────────────────────────────────
# COGNITO
# ─────────────────────────────────────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "advolt-users-${Stage}"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
        - Name: full_name
          AttributeDataType: String
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "advolt-client-${Stage}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        RefreshToken: days

# ─────────────────────────────────────────────
# DYNAMODB
# ─────────────────────────────────────────────

  AdsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "advolt-ads-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ad_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: advertiser_name
          AttributeType: S
      KeySchema:
        - AttributeName: ad_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-created-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: user-advertiser-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: advertiser_name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  AiAnalysisTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "advolt-ai-analysis-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: analysis_id
          AttributeType: S
        - AttributeName: ad_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: analysis_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ad-created-index
          KeySchema:
            - AttributeName: ad_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "advolt-users-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "advolt-projects-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: project_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-created-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

# ─────────────────────────────────────────────
# S3 + CLOUDFRONT
# ─────────────────────────────────────────────

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "advolt-media-971598352248-${Stage}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteAudioAfter30Days
            Prefix: "audio/"
            Status: Enabled
            ExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedHeaders: ['*']
            MaxAge: 3600

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${MediaBucket.Arn}/*"

  MediaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "advolt-oac-${Stage}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: MediaBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
        Origins:
          - Id: MediaBucketOrigin
            DomainName: !GetAtt MediaBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt MediaOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""

  SelectorConfigBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "advolt-selector-config-971598352248-${Stage}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

# ─────────────────────────────────────────────
# SQS + EVENTBRIDGE
# ─────────────────────────────────────────────

  AiQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "advolt-ai-queue-${Stage}"
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AiDLQ.Arn
        maxReceiveCount: 3

  AiDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "advolt-ai-dlq-${Stage}"
      MessageRetentionPeriod: 1209600 # 14 days

  AdSavedEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "advolt-events-${Stage}"

# ─────────────────────────────────────────────
# SHARED LAYER
# ─────────────────────────────────────────────

  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "advolt-shared-${Stage}"
      ContentUri: src/shared/
      CompatibleRuntimes: [nodejs20.x]
    Metadata:
      BuildMethod: nodejs20.x

# ─────────────────────────────────────────────
# LAMBDA — AUTHORIZER
# ─────────────────────────────────────────────

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-authorizer-${Stage}"
      CodeUri: src/auth/
      Handler: authorizer.handler
      Timeout: 10

# ─────────────────────────────────────────────
# LAMBDA — AUTH
# ─────────────────────────────────────────────

  AuthSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-auth-signup-${Stage}"
      CodeUri: src/auth/
      Handler: signup.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /auth/signup
            Method: POST
            Auth:
              Authorizer: NONE

  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-auth-login-${Stage}"
      CodeUri: src/auth/
      Handler: login.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-auth-refresh-${Stage}"
      CodeUri: src/auth/
      Handler: refresh.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /auth/refresh
            Method: POST
            Auth:
              Authorizer: NONE

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-update-profile-${Stage}"
      CodeUri: src/auth/
      Handler: updateProfile.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /auth/profile
            Method: POST

  GeneratePersonaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-generate-persona-${Stage}"
      CodeUri: src/auth/
      Handler: generatePersona.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /auth/persona
            Method: POST

# ─────────────────────────────────────────────
# LAMBDA — ADS
# ─────────────────────────────────────────────

  SaveAdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-save-ad-${Stage}"
      CodeUri: src/ads/
      Handler: saveAd.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3WritePolicy:
            BucketName: !Ref MediaBucket
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref AdSavedEventBus
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ads/save
            Method: POST

  GetAdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-get-ads-${Stage}"
      CodeUri: src/ads/
      Handler: getAds.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AdsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ads
            Method: GET

  GetAdDetailsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-get-ad-details-${Stage}"
      CodeUri: src/ads/
      Handler: getAdDetails.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AdsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AiAnalysisTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ads/{id}
            Method: GET

  DeleteAdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-delete-ad-${Stage}"
      CodeUri: src/ads/
      Handler: deleteAd.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ads/{id}
            Method: DELETE

  UpdateAdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-update-ad-${Stage}"
      CodeUri: src/ads/
      Handler: updateAd.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ads/{id}
            Method: PATCH

# ─────────────────────────────────────────────
# LAMBDA — AI
# ─────────────────────────────────────────────

  TriggerAiAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-trigger-ai-${Stage}"
      CodeUri: src/ai/
      Handler: triggerAnalysis.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AiQueue.QueueName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/analyze/{ad_id}
            Method: POST

  ProcessAiAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-process-ai-${Stage}"
      CodeUri: src/ai/
      Handler: processAnalysis.handler
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          CLAUDE_API_KEY: !Ref ClaudeApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AiAnalysisTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - SQSPollerPolicy:
            QueueName: !GetAtt AiQueue.QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt AiQueue.Arn
            BatchSize: 1

  GetAiResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-get-ai-result-${Stage}"
      CodeUri: src/ai/
      Handler: getResult.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref AiAnalysisTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/result/{ad_id}
            Method: GET

  EstimateTokensFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-estimate-tokens-${Stage}"
      CodeUri: src/ai/
      Handler: estimateTokens.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/estimate
            Method: POST

  GenerateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-generate-${Stage}"
      CodeUri: src/ai/
      Handler: generate.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/generate
            Method: POST

  TranscribeVideoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-transcribe-video-${Stage}"
      CodeUri: src/ai/
      Handler: transcribeVideo.handler
      Timeout: 120
      MemorySize: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AdsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/transcribe
            Method: POST

  CreateStudioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-create-studio-${Stage}"
      CodeUri: src/ai/
      Handler: createStudio.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /ai/studio
            Method: POST

# ─────────────────────────────────────────────
# LAMBDA — PROJECTS
# ─────────────────────────────────────────────

  CreateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-create-project-${Stage}"
      CodeUri: src/projects/
      Handler: createProject.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProjectsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /projects
            Method: POST

  GetProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-get-projects-${Stage}"
      CodeUri: src/projects/
      Handler: getProjects.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProjectsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /projects
            Method: GET

  GetProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-get-project-${Stage}"
      CodeUri: src/projects/
      Handler: getProject.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProjectsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /projects/{id}
            Method: GET

  UpdateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-update-project-${Stage}"
      CodeUri: src/projects/
      Handler: updateProject.handler
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProjectsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /projects/{id}
            Method: PATCH

  DeleteProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-delete-project-${Stage}"
      CodeUri: src/projects/
      Handler: deleteProject.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProjectsTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /projects/{id}
            Method: DELETE

# ─────────────────────────────────────────────
# LAMBDA — MEDIA
# ─────────────────────────────────────────────

  OptimizeImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-optimize-image-${Stage}"
      CodeUri: src/media/
      Handler: optimizeImage.handler
      Timeout: 60
      MemorySize: 512
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket

# ─────────────────────────────────────────────
# LAMBDA — BILLING
# ─────────────────────────────────────────────

  CreatePaymentOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-create-payment-order-${Stage}"
      CodeUri: src/billing/
      Handler: createOrder.handler
      Environment:
        Variables:
          RAZORPAY_KEY: !Ref RazorpayKey
          RAZORPAY_SECRET: !Ref RazorpaySecret
          PAYU_MERCHANT_KEY: !Ref PayUMerchantKey
          PAYU_SALT: !Ref PayUSalt
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /billing/create-order
            Method: POST

  PaymentWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-payment-webhook-${Stage}"
      CodeUri: src/billing/
      Handler: webhook.handler
      Environment:
        Variables:
          RAZORPAY_WEBHOOK_SECRET: !Ref RazorpayWebhookSecret
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /billing/webhook
            Method: POST
            Auth:
              Authorizer: NONE

  GetBillingStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-billing-status-${Stage}"
      CodeUri: src/billing/
      Handler: getStatus.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref AdvoltApi
            Path: /billing/status
            Method: GET

  ResetTokensFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "advolt-reset-tokens-${Stage}"
      CodeUri: src/billing/
      Handler: resetTokens.handler
      Timeout: 120
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)
            Description: Reset monthly tokens for Pro users daily

# ─────────────────────────────────────────────
# GATEWAY RESPONSES (add CORS headers to auth errors)
# ─────────────────────────────────────────────

  GatewayResponseUnauthorized:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref AdvoltApi
      ResponseType: UNAUTHORIZED
      StatusCode: "401"
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      ResponseTemplates:
        application/json: '{"error":"Unauthorized"}'

  GatewayResponseDefault4xx:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref AdvoltApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

  GatewayResponseDefault5xx:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref AdvoltApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

# ─────────────────────────────────────────────
# SECRETS MANAGER
# ─────────────────────────────────────────────

  ApiSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "advolt/${Stage}/api-keys"
      Description: Advolt.ai API keys for AI and payment providers
      SecretString: !Sub |
        {
          "OPENAI_API_KEY": "${OpenAIApiKey}",
          "CLAUDE_API_KEY": "${ClaudeApiKey}",
          "RAZORPAY_KEY": "${RazorpayKey}",
          "RAZORPAY_SECRET": "${RazorpaySecret}",
          "RAZORPAY_WEBHOOK_SECRET": "${RazorpayWebhookSecret}"
        }

# ─────────────────────────────────────────────
# SES — EMAIL
# ─────────────────────────────────────────────

  SesConfigSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub "advolt-ses-${Stage}"

# ─────────────────────────────────────────────
# CLOUDWATCH ALARMS
# ─────────────────────────────────────────────

  AiQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "advolt-ai-queue-depth-${Stage}"
      AlarmDescription: AI queue depth is high — processing may be backed up
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AiQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  AiDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "advolt-ai-dlq-messages-${Stage}"
      AlarmDescription: Messages in AI dead-letter queue — AI processing is failing
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AiDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ProcessAiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "advolt-process-ai-errors-${Stage}"
      AlarmDescription: AI processing Lambda is throwing errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProcessAiAnalysisFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "advolt-api-5xx-${Stage}"
      AlarmDescription: API Gateway 5xx error rate is elevated
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Sub "advolt-api-${Stage}"
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub "https://${AdvoltApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito Client ID
    Value: !Ref UserPoolClient
  MediaBucketName:
    Description: S3 media bucket
    Value: !Ref MediaBucket
  CloudFrontUrl:
    Description: CloudFront distribution URL
    Value: !Sub "https://${MediaDistribution.DomainName}"
  AiQueueUrl:
    Description: SQS AI queue URL
    Value: !Ref AiQueue
  SecretsArn:
    Description: Secrets Manager ARN for API keys
    Value: !Ref ApiSecrets
