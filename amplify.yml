version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix Advolt.ai/frontend
    build:
      commands:
        - npm run build --prefix Advolt.ai/frontend
  artifacts:
    baseDirectory: Advolt.ai/frontend/out
    files:
      - '**/*'
  cache:
    paths:
      - Advolt.ai/frontend/node_modules/**/*
